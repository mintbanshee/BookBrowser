<div class="header py-4 mb-4 border-bottom">
  <div class="container text-center">
    <h1 class="mb-2 header-title">Book Browser</h1>
    <p class="mb-0 text-white fw-light fst-italic">Stories, code, and curious things.</p>
  </div>
</div>

<div class="container py-4 text-center fw-medium">
  <h1 class="mb-2 header-title">Add A New Book</h1>
  <p class="mb-4 text-muted">✦ ━━━━━━━━━━━━ ✦ ༺❦༻ ✦ ━━━━━━━━━━━━ ✦</p>

  <div *ngIf="errorMessage" class="text-danger mb-4">
    {{ errorMessage }}
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card border-2 border-dark shadow-md rounded-3">
        <div class="card-body p-4 text-start">

          <form [formGroup]="bookForm" (ngSubmit)="submit()">

            <div class="mb-3">
              <label for="title" class="form-label">Title</label>
              <input id="title" type="text" class="form-control" formControlName="title">
            </div>

            <div class="mb-3">
              <label for="author" class="form-label">Author</label>
              <input id="author" type="text" class="form-control" formControlName="author">
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea id="description" class="form-control" rows="4" formControlName="description"></textarea>
            </div>

            <div class="mb-3">
              <label for="genre" class="form-label">Genre</label>
              <input id="genre" type="text" class="form-control" formControlName="genre">
            </div>

            <div class="mb-4">
              <label for="year" class="form-label">Year</label>
              <input id="year" type="number" class="form-control" formControlName="year">
            </div>

            <div class="d-flex justify-content-center gap-2 flex-wrap">
              <button type="submit" class="btn btn-plum btn-sm">
                Save Changes
              </button>

              <a routerLink="/books" class="btn btn-outline-dark btn-sm">
                Cancel
              </a>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>
